spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/smart_issue_tracker
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-dev-key}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
